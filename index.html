<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Board Game GIF Maker</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23d6b171'/%3E%3Ccircle cx='32' cy='32' r='22' fill='%23fdf7ea' stroke='%235a3417' stroke-width='4'/%3E%3Ctext x='32' y='39' text-anchor='middle' font-size='24' font-family='serif' fill='%239f1f1f'%3E%E8%BB%8A%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;600;700&family=Noto+Serif+SC:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Static Creator Tool</p>
        <h1>Board Game GIF Maker</h1>
        <p class="hero-copy">
          Choose a game, import notation, review the move tree or range, and export a GIF.
          Xiangqi, Chess, Weiqi / Go, and Shogi now share one creator-focused workflow.
        </p>
      </header>

      <section class="card mode-selector-card">
        <div class="mode-selector-header">
          <div>
            <p class="eyebrow">Game Mode</p>
            <h2 id="mode-title">Xiangqi</h2>
            <p id="mode-copy" class="helper-copy">
              Board editor, playback, and FEN/UCCI GIF export.
            </p>
          </div>
        </div>
        <div id="mode-nav" class="mode-nav" aria-label="Game mode tabs"></div>
      </section>

      <main id="mode-host"></main>
    </div>

    <script src="./vendor-gif.js"></script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
